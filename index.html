<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3DGS Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #07111c;
      --bg-2: #14283e;
      --panel: rgba(6, 11, 18, 0.72);
      --panel-border: rgba(201, 229, 255, 0.18);
      --text-main: #f7fbff;
      --text-sub: rgba(247, 251, 255, 0.74);
      --text-error: #ffbdbd;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(81, 133, 188, 0.32), transparent 36%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 10;
      max-width: 460px;
      padding: 14px 16px;
      color: var(--text-main);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-sizing: border-box;
      pointer-events: none;
      opacity: 1;
      transition: opacity 240ms ease;
    }

    #hud.is-hidden {
      opacity: 0;
    }

    #title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #status {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    #detail,
    #error {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #detail {
      color: var(--text-sub);
    }

    #error {
      margin-top: 6px;
      color: var(--text-error);
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <p id="title">3DGS PLY Viewer</p>
    <p id="status">読み込み中...</p>
    <p id="detail">このフォルダー内の PLY を表示します。</p>
    <p id="error"></p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const PLY_FILE = './okuamano.ply';
    const MODEL_SCALE = 0.5;

    const app = document.getElementById('app');
    const hudEl = document.getElementById('hud');
    const statusEl = document.getElementById('status');
    const detailEl = document.getElementById('detail');
    const errorEl = document.getElementById('error');

    function showHud() {
      hudEl.classList.remove('is-hidden');
    }

    function hideHud() {
      hudEl.classList.add('is-hidden');
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function setDetail(message) {
      detailEl.textContent = message;
    }

    function setError(error) {
      const message = error instanceof Error ? error.message : String(error);
      showHud();
      errorEl.textContent = message;
      console.error(error);
    }

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(2, 1, 6);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.minDistance = 0.1;
    controls.maxDistance = 1000;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x1a2430, 2.0));

    const viewerRoot = new THREE.Group();
    scene.add(viewerRoot);

    const splatViewer = new GaussianSplats3D.DropInViewer({
      selfDrivenMode: false,
      useBuiltInControls: false,
      gpuAcceleratedSort: false,
      sharedMemoryForWorkers: false,
      enableSIMDInSort: false,
      integerBasedSort: false,
      ignoreDevicePixelRatio: true,
      sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
      renderMode: GaussianSplats3D.RenderMode.Always,
      dynamicScene: false,
      antialiased: false,
      sphericalHarmonicsDegree: 0
    });
    viewerRoot.add(splatViewer);

    function frameLoadedScene(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      if (box.isEmpty()) {
        return false;
      }

      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxSize = Math.max(size.x, size.y, size.z, 0.001);
      const fitHeightDistance = maxSize / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5)));
      const fitWidthDistance = fitHeightDistance / camera.aspect;
      const distance = Math.max(fitHeightDistance, fitWidthDistance) * 3.4;

      camera.near = Math.max(distance / 500, 0.01);
      camera.far = Math.max(distance * 20, 1000);
      camera.position.set(
        center.x + distance * 0.24,
        center.y + distance * 0.68,
        center.z + distance * 1.35
      );
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.maxDistance = distance * 8;
      controls.update();
      return true;
    }

    async function ensureFileExists(path) {
      const response = await fetch(path, { method: 'HEAD', cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`${path} が見つかりません。index.html と同じ場所に置いてください。`);
      }
    }

    async function loadViewer() {
      showHud();
      setStatus('PLY を確認中');
      setDetail(`${PLY_FILE} を探しています。`);
      await ensureFileExists(PLY_FILE);

      setStatus('3DGS を読み込み中');
      setDetail(`${PLY_FILE} を表示しています。ドラッグで回転、ホイールやピンチで拡大縮小できます。`);

      await splatViewer.addSplatScenes([
        {
          path: PLY_FILE,
          format: GaussianSplats3D.SceneFormat.Ply,
          splatAlphaRemovalThreshold: 1,
          position: [0, 0, 0],
          rotation: [1, 0, 0, 0],
          scale: [MODEL_SCALE, MODEL_SCALE, MODEL_SCALE]
        }
      ]);

      requestAnimationFrame(() => {
        if (!frameLoadedScene(viewerRoot)) {
          setDetail(`${PLY_FILE} を表示しました。視点は手動で調整してください。`);
        }
      });

      setStatus('表示中');
      setDetail(`${PLY_FILE} を表示しました。GitHub Pages でも同じ構成で動作します。`);
      setTimeout(hideHud, 700);
    }

    function render() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loadViewer().catch((error) => {
      setStatus('読み込みに失敗しました');
      setDetail('PLY の配置場所やホスティング方法を確認してください。');
      setError(error);
    });

    render();
  </script>
</body>
</html>
